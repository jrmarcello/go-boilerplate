apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: go-boilerplate
  labels:
    app: go-boilerplate
spec:
  podSelector:
    matchLabels:
      app: go-boilerplate
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound traffic on port 8080 from ingress-nginx namespace only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution (kube-dns / CoreDNS)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Redis
    - ports:
        - protocol: TCP
          port: 6379
    # OpenTelemetry Collector (gRPC + HTTP)
    - ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
