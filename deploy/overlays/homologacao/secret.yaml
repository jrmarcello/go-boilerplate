apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ms-boilerplate-go-secrets
spec:
  refreshInterval: 240m

  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore

  target:
    name: ms-boilerplate-go-secrets
    creationPolicy: Owner

  # Sincronizar todos os valores do secret do AWS Secrets Manager
  dataFrom:
    - extract:
        key: "eks/homologacao/ms-boilerplate-go"
