apiVersion: v1
kind: ConfigMap
metadata:
  name: people-service-registry-config
  labels:
    app: people-service-registry
data:
  APP_ENV: "development"
  SERVER_PORT: "8080"
  DB_DSN: "postgres://user:password@postgres-service:5432/people?sslmode=disable"
  OTEL_SERVICE_NAME: "people-service-registry"
  OTEL_COLLECTOR_URL: "" # Desabilitado localmente
  REDIS_URL: "redis://redis-service:6379"
  REDIS_TTL: "5m"
  REDIS_ENABLED: "true"
