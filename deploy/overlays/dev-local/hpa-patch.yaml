apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-boilerplate-go
  labels:
    app: ms-boilerplate-go
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ms-boilerplate-go
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
